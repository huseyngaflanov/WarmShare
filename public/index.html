<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Warmshare</title>
    <script src="https://kit.fontawesome.com/0e9f674907.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/screen1.css">
    <link rel="stylesheet" href="styles/screen2.css">
    <link rel="stylesheet" href="styles/screen3.css">
  </head>
  <body>

    <!-- <div class="cursor" id="cursor"></div>
    <script src="scripts/cursor.js" charset="utf-8"></script> -->
    <div id="left-screen" class="thirds-screen">

    </div>
    <div id="middle-screen" class="thirds-screen">
      <main>
        <div id="screen1" class="screen">
          <h1 id="search-h1">Search!</h1>
          <input type="text" class="default" placeholder="What is it?" name="" value="" oninput="searchMode(this)" onfocus="searchMode(this)" onblur="outSearchMode(this)">

          <div id="search-results" class="results" style="">
            <div class="search-result">
              <div class="left">
                <span class="name">Huseyn</span>
                <span class="username">huseyngaflanov</span>
              </div>
              <div class="add-btn">
                <i class="fa-solid fa-plus"></i>
              </div>
            </div>

            <div class="search-result">
              <div class="left">
                <span class="name">Huseyn</span>
                <span class="username">huseyngaflanov</span>
              </div>
              <div class="add-btn">
                <i class="fa-solid fa-plus"></i>
              </div>
            </div>
            <div class="search-result">
              <div class="left">
                <span class="name">Huseyn</span>
                <span class="username">huseyngaflanov</span>
              </div>
              <div class="add-btn">
                <i class="fa-solid fa-plus"></i>
              </div>
            </div>
          </div>

          <script type="text/javascript">
            const searchH1 = document.getElementById('search-h1');
            const searchResults = document.getElementById('search-results');
            function searchMode(inp) {
              if (inp.value !== '') {
                inp.className = 'searching';
                searchH1.className = 'searching';
                searchResults.className = 'searching';
              }
            }

            function outSearchMode(inp) {
              if (inp.value.trim() === '') {
                inp.className = '';
                searchH1.className = '';
                searchResults.className = '';
              }
            }
          </script>
        </div>

        <div id="screen2" class="screen ">
          <h1>Hello, Huseyn!</h1>

          <div class="posts">

          </div>
        </div>



        <div id="screen3" class="screen selected">

          <div class="profile-pic">
            <div class="inner">
              <svg id="waveSvg" viewBox="0 0 160 160"></svg>
              <img src="pp.jpg" alt="">
            </div>
          </div>
          <script src="scripts/wave.js" charset="utf-8"></script>

          <div class="profile-form">
            <input type="text" class="name" name="" value="Your Name">
            <input type="text" class="username" name="" value="your_username">
            <button type="button" class="save" name="button">Save</button>
          </div>

        </div>
      </main>
      <nav class="main-nav" id="main-nav">
        <div class="nav-btn" id="nav-btn1">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="nav-btn selected" id="nav-btn2">
          <i class="fa-regular fa-house" id="nav-btn2-i"></i>
        </div>
        <div class="nav-btn" id="nav-btn3">
          <i class="fa-regular fa-user"></i>
        </div>
      </nav>
    </div>
    <div id="right-screen" class="thirds-screen">

    </div>

    <script src="scripts/main-nav.js" charset="utf-8"></script>
  </body>
</html>
