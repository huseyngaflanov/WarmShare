<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Warmshare</title>
    <script src="https://kit.fontawesome.com/0e9f674907.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/screen1.css">
  </head>
  <body>

    <!-- <div class="cursor" id="cursor"></div>
    <script src="scripts/cursor.js" charset="utf-8"></script> -->

    <main>
      <div id="screen1" class="screen selected">
        <h1 id="search-h1">Search!</h1>
        <input type="text" class="default" placeholder="What is it?" name="" value="" oninput="searchMode(this)" onfocus="searchMode(this)" onblur="outSearchMode(this)">

        <div class="results" style="display: none;">
          <div class="result">
            hello\
            dddfs
            <dd>fsdfddf</dd>
          </div>
        </div>

        <script type="text/javascript">
          function searchMode(inp) {
            if (inp.value !== '') inp.className = 'searching';
          }

          function outSearchMode(inp) {
            if (inp.value.trim() === '') inp.className = '';
          }
        </script>
      </div>

      <div id="screen2" class="screen">


        <h1>Hello, Huseyn!</h1>
        <div class="add-btn">
          <i class="fa-solid fa-plus"></i>
        </div>
      </div>

      <div id="screen3" class="screen">

      </div>

    </main>
    <nav class="main-nav" id="main-nav">
      <div class="nav-btn" id="nav-btn1">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <div class="nav-btn selected" id="nav-btn2">
        <i class="fa-regular fa-house"></i>
      </div>
      <div class="nav-btn" id="nav-btn3">
        <i class="fa-regular fa-user"></i>
      </div>
    </nav>

    <script src="scripts/main-nav.js" charset="utf-8"></script>
  </body>
</html>
